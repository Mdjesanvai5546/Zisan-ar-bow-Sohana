<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do You Love Me?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- প্রশ্ন করার মেইন বক্স -->
    <div class="question-container" id="questionBox">
        <img class="load-gif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExbW9scXN6MDZsZG1nd3VwZWF5NXY4Ym9pZnd0cmY5dHZiZ2p4N2p1NSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3R4PWcmbXQ9cw/cLS1cfxvGOPVpf9g3y/giphy.gif" alt="Cute Bear">
        <h2 class="question">Do you love me? ❤️</h2>
        
        <div class="button-container">
            <button class="yes-btn" id="yesBtn">Yes</button>
            <button class="no-btn" id="noBtn">No</button>
        </div>
    </div>

    <!-- "Yes" বাটনে চাপ দিলে যা আসবে -->
    <div class="result-container" id="resultBox" style="display: none;">
        <img class="gif-result" src="https://media.giphy.com/media/KztT2c4u8mYYUiBtEE/giphy.gif" alt="Happy Bear">
        <h2>I knew it! 🥰</h2>
    </div>

    <script src="script.js"></script>
</body>
</html>
